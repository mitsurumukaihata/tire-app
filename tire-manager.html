<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<title>タイヤ入出庫 | Tire Manager f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

/* ダークモード（デフォルト）: チャコール × アンバー */
:root {
  --bg: #18181f;
  --s1: #101015;
  --s2: #1e1e26;
  --s3: #26262f;
  --border: #2c2c38;
  --border2: #3c3c4a;
  --text: #f0f0f2;
  --muted: #68687a;
  --accent: #f0a500;
  --accent2: #f5be40;
  --green: #22c55e;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --red: #ef4444;
  --purple: #a855f7;
}

/* ライトモード: クリーム白 × バーントオレンジ */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee;
    --s1: #ffffff;
    --s2: #fdf0e4;
    --s3: #f5e6d4;
    --border: #e8d8c4;
    --border2: #d8c4a8;
    --text: #1a1208;
    --muted: #a08060;
    --accent: #e07000;
    --accent2: #c05800;
    --green: #1a9e4a;
    --blue: #2563eb;
    --yellow: #d97706;
    --red: #dc2626;
    --purple: #9333ea;
  }
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── Token Gate ── */
#token-gate {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 24px;
}
.gate-logo { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 32px; }
.gate-title { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
.gate-title span { color: var(--accent); }
.gate-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
.gate-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.gate-input {
  width: 100%;
  background: var(--s2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  outline: none;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.gate-input:focus { border-color: var(--accent); }
.gate-input::placeholder { color: var(--muted); }
.gate-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 15px;
  color: #ffffff;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  margin-top: 4px;
}
.gate-note { font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.6; }
.gate-staff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.gate-staff-btn {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 10px; text-align: center;
  cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text);
  transition: all 0.15s;
}
.gate-staff-btn:active { transform: scale(0.97); }
.gate-staff-btn.selected { border-color: var(--accent); background: rgba(240,165,0,0.1); color: var(--accent); }
.gate-start-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.prep-divider { text-align:center; color:var(--muted); font-size:12px; margin:12px 0; letter-spacing:0.05em; }
.btn-prep {
  width:100%; background:rgba(240,165,0,0.1); border:1.5px solid var(--accent);
  border-radius:10px; padding:13px; color:var(--accent); font-size:14px;
  font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700;
  transition:all 0.15s;
}
.btn-prep:active { transform:scale(0.97); }
.prep-list-item {
  background:var(--s2); border:1px solid var(--border); border-radius:10px;
  padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:all 0.15s;
}
.prep-list-item:active { transform:scale(0.98); border-color:var(--accent); }
.prep-row1 { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.prep-dest { font-size:13px; font-weight:700; color:var(--text); flex:1; }
.prep-pattern { font-size:13px; font-weight:700; color:var(--accent); }
.prep-size { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; }
.prep-row2 { display:flex; gap:12px; }
.prep-qty { font-size:12px; color:var(--green); font-weight:700; }
.prep-warehouse { font-size:12px; color:var(--muted); }
.prep-empty { text-align:center; padding:32px 20px; color:var(--muted); font-size:14px; }

/* ── App Shell ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

.header {
  background: var(--s1);
  border-bottom: 0.5px solid var(--border);
  padding: 14px 20px 10px;
  position: sticky; top: 0; z-index: 100;
}
.header-brand { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
.header-title { font-size: 17px; font-weight: 900; letter-spacing: -0.02em; }
.header-title span { color: var(--accent); }

.nav {
  display: flex;
  background: var(--s1);
  border-bottom: 0.5px solid var(--border);
}
.nav-btn {
  flex: 1;
  padding: 10px 6px 8px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.page { display: none; flex: 1; overflow-y: auto; padding-bottom: 40px; }
.page.active { display: block; }

/* ── Step bar ── */
.step-bar { display: flex; gap: 4px; padding: 12px 20px; background: var(--s1); border-bottom: 0.5px solid var(--border); }
.step-dot { height: 2px; flex: 1; background: var(--border); border-radius: 2px; transition: background 0.3s; }
.step-dot.done { background: var(--accent); }
.step-dot.active { background: var(--accent2); }

/* ── Content ── */
.content { padding: 20px; }
.screen-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.screen-title { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.2; }
.screen-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 16px; }

/* ── Buttons ── */
.btn-primary {
  width: 100%; background: var(--accent); border: none; border-radius: 10px;
  padding: 14px; color: #ffffff; font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 10px;
  transition: opacity 0.15s;
}
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary {
  width: 100%; background: transparent; border: 1.5px solid var(--border2);
  border-radius: 10px; padding: 12px; color: var(--text); font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 6px;
  font-weight: 500;
}
.btn-danger {
  width: 100%; background: transparent; border: 1px solid var(--red);
  border-radius: 10px; padding: 11px; color: var(--red); font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 6px;
}

/* ── Search ── */
.search-box {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  transition: border-color 0.15s;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box input {
  background: transparent; border: none; outline: none;
  color: var(--text); font-size: 18px; font-family: 'DM Mono', monospace;
  font-weight: 500; flex: 1; width: 100%;
}
.search-box input::placeholder { color: var(--muted); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; }
.search-clear {
  background: var(--s3); border: none; border-radius: 50%;
  width: 20px; height: 20px; color: var(--muted); font-size: 12px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── Candidates ── */
.candidates { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.candidate {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; transition: all 0.12s;
}
.candidate:active { transform: scale(0.98); }
.candidate.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.candidate-text { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
.candidate-badge { font-size: 9px; padding: 2px 7px; border-radius: 20px; background: rgba(240,165,0,0.12); color: var(--accent2); }

/* ── Cat cards ── */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.cat-card {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 12px; cursor: pointer; transition: all 0.12s;
}
.cat-card:active { transform: scale(0.97); }
.cat-card.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.cat-card.sel::before { background: var(--accent); }
.cat-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.cat-name { font-size: 12px; font-weight: 700; line-height: 1.3; }
.cat-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── Pattern list ── */
.pattern-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.pattern-item {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 12px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 10px; transition: all 0.12s;
}
.pattern-item:active { transform: scale(0.98); }
.pattern-item.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.pattern-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.15s; }
.pattern-item.sel .pattern-dot { background: var(--accent); }
.pattern-name { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }

/* ── Numpad ── */
.numpad-disp {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 12px;
}
.num-val { font-size: 52px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; line-height: 1; }
.num-val.empty { color: var(--muted); font-size: 24px; padding: 14px 0; }
.num-unit { font-size: 13px; color: var(--muted); margin-top: 4px; }
.numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.np-btn {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 16px; font-size: 18px; font-weight: 500;
  color: var(--text); cursor: pointer; text-align: center; transition: all 0.1s;
  font-family: 'DM Mono', monospace;
}
.np-btn:active { background: var(--s3); transform: scale(0.95); }
.np-del { color: var(--accent); }

/* ── Type buttons ── */
.type-group { margin-bottom: 16px; }
.type-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.type-sep { height: 8px; }
.type-btn {
  border-radius: 8px; padding: 10px 6px; cursor: pointer;
  text-align: center; border: 1.5px solid transparent; transition: all 0.12s;
}
.type-btn:active { transform: scale(0.96); }
.type-btn .tn { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.type-btn .ts { font-size: 9px; opacity: 0.7; }
.t-in  { background: rgba(34,197,94,0.12);  color: var(--green); }
.t-in.sel  { border-color: var(--green); }
.t-out { background: rgba(239,68,68,0.12);  color: var(--red); }
.t-out.sel { border-color: var(--red); }
.t-pre { background: rgba(245,158,11,0.12); color: var(--yellow); }
.t-pre.sel { border-color: var(--yellow); }
.t-r1  { background: rgba(59,130,246,0.12); color: var(--blue); }
.t-r1.sel  { border-color: var(--blue); }
.t-r2  { background: rgba(168,85,247,0.12); color: var(--purple); }
.t-r2.sel  { border-color: var(--purple); }
.t-mv  { background: rgba(255,92,43,0.12);  color: var(--accent); }
.t-mv.sel  { border-color: var(--accent); }

/* ── Dest input ── */
.dest-wrap { margin-top: 12px; }
.dest-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.dest-input {
  width: 100%; background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 12px 14px; font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif; color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.dest-input:focus { border-color: var(--accent); }
.dest-input::placeholder { color: var(--muted); }

/* ── Warehouse buttons ── */
.soko-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.soko-btn {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 12px; transition: all 0.12s;
}
.soko-btn:active { transform: scale(0.98); }
.soko-btn.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.soko-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.soko-name { font-size: 15px; font-weight: 700; }

/* ── Move screen ── */
.move-info {
  background: rgba(240,165,0,0.08); border: 1px solid rgba(255,92,43,0.25);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 16px;
  font-size: 12px; color: var(--accent2); line-height: 1.5;
}
.move-section { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.move-main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.move-card-big {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 16px 10px; cursor: pointer;
  text-align: center; transition: all 0.12s;
}
.move-card-big:active { transform: scale(0.97); }
.move-card-big.sel { border-color: var(--accent); background: rgba(240,165,0,0.1); }
.move-card-big .mf { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.move-card-big .ma { font-size: 20px; color: var(--accent); line-height: 1; margin-bottom: 6px; }
.move-card-big .mt { font-size: 13px; font-weight: 700; color: var(--text); }
.move-card-big .mb { font-size: 9px; color: var(--accent2); margin-top: 6px; background: rgba(240,165,0,0.12); padding: 2px 8px; border-radius: 20px; display: inline-block; }
.move-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
.move-card-sm {
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 12px 8px; cursor: pointer;
  text-align: center; transition: all 0.12s;
}
.move-card-sm:active { transform: scale(0.97); }
.move-card-sm.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.move-card-sm .sf { font-size: 11px; font-weight: 700; color: var(--text); }
.move-card-sm .sa { font-size: 14px; color: var(--muted); margin: 2px 0; }
.move-card-sm.sel .sa { color: var(--accent); }
.move-card-sm .st { font-size: 11px; font-weight: 700; color: var(--text); }

/* ── Confirm ── */
.confirm-box {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.conf-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 0.5px solid var(--border);
}
.conf-row:last-child { border-bottom: none; }
.conf-label { font-size: 11px; color: var(--muted); }
.conf-val { font-size: 13px; font-weight: 500; text-align: right; }
.conf-size { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent2); }
.type-tag {
  font-size: 10px; font-weight: 700; padding: 3px 9px;
  border-radius: 20px; display: inline-block;
}
.tag-in  { background: rgba(34,197,94,0.15);  color: var(--green); }
.tag-out { background: rgba(239,68,68,0.15);  color: var(--red); }
.tag-pre { background: rgba(245,158,11,0.15); color: var(--yellow); }
.tag-r1  { background: rgba(59,130,246,0.15); color: var(--blue); }
.tag-r2  { background: rgba(168,85,247,0.15); color: var(--purple); }
.tag-mv  { background: rgba(240,165,0,0.12);  color: var(--accent); }

.record-preview {
  margin-top: 10px; background: var(--s1);
  border-radius: 8px; padding: 10px 12px;
}
.rp-title { font-size: 10px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
.rp-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.rp-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.rp-text { font-size: 11px; color: var(--muted); }

/* ── Success ── */
.success-wrap { text-align: center; padding: 24px 20px; }
.success-icon {
  width: 64px; height: 64px; background: rgba(34,197,94,0.15);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; margin: 0 auto 16px; font-size: 28px; color: var(--green);
}
.success-title { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 8px; }
.success-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
.success-tag {
  display: inline-block; margin-top: 12px;
  background: rgba(255,92,43,0.12); color: var(--accent2);
  padding: 5px 14px; border-radius: 20px; font-size: 11px;
}
.success-records { margin-top: 16px; background: var(--s2); border-radius: 10px; padding: 12px 14px; text-align: left; }

/* ── Error ── */
.error-box {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px; padding: 12px 14px; margin-bottom: 12px;
  font-size: 12px; color: var(--red); line-height: 1.5;
}

/* ── Loading ── */
.loading-wrap { text-align: center; padding: 40px 20px; }
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--muted); }

/* ── Memo ── */
.memo-input {
  width: 100%; background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 12px 14px; font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif; color: var(--text);
  outline: none; resize: none; transition: border-color 0.15s; min-height: 72px;
}
.memo-input:focus { border-color: var(--accent); }
.memo-input::placeholder { color: var(--muted); }

/* ── 在庫ページ ── */
.stock-size-search { padding: 16px 20px 0; }
.stock-results { padding: 0 20px 20px; }
.stock-cat-title {
  font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em;
  text-transform: uppercase; padding: 16px 0 8px;
  border-bottom: 0.5px solid var(--border); margin-bottom: 8px;
}
.stock-row {
  display: flex; align-items: center; padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
}
.stock-row:last-child { border-bottom: none; }
.stock-pattern { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; min-width: 80px; }
.stock-counts { display: flex; gap: 8px; flex: 1; justify-content: flex-end; }
.stock-count { text-align: center; }
.stock-count-num { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
.stock-count-num.zero { color: var(--muted); }
.stock-count-num.positive { color: var(--green); }
.stock-count-label { font-size: 9px; color: var(--muted); margin-top: 1px; }
.stock-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

.cat-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 16px 20px; }
.cat-sel-btn {

.price-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }

.price-size { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

let _selectedStaff = '';
function selectStaff(name) {
  _selectedStaff = name;
  document.querySelectorAll('.gate-staff-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === name);
  });
  const sel = document.getElementById('selected-staff');
  if (sel) sel.innerHTML = `<div style="text-align:center;font-size:14px;font-weight:700;color:var(--accent);">選択中：${name}</div>`;

function startApp() {
  if (!_selectedStaff) { showGateError('社員名を選択してください'); return; }
  USER_NAME = _selectedStaff;
  localStorage.setItem('tire_name', _selectedStaff);
  launchApp();
}

function showGateError(msg) {
  const el = document.getElementById('gate-error');
  el.textContent = msg; el.style.display = 'block';

  document.getElementById('token-gate').style.display = 'none';

  renderEntry();
  renderStockHome();

    let cursor;
    // 最大500件（5ページ）取得してユニークなサイズを収集
    for (let page = 0; page < 5; page++) {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await notionAPI('POST', `/databases/${db.id}/query`, body);
      if (res.object === 'error') break;
      res.results.forEach(r => {
        const sz = r.properties['サイズ']?.rich_text?.[0]?.plain_text;
        if (sz && sz.trim()) allSizes.add(sz.trim());
      });
      if (!res.has_more) break;
      cursor = res.next_cursor;
    }
    const sorted = [...allSizes].sort((a, b) => a.localeCompare(b, 'ja', { numeric: true }));
    PRICE_SIZE_CACHE[dbKey] = sorted;
    return sorted;
  } catch(e) {
    console.warn('fetchPriceSizes fallback:', e.message);
    return PRICE_SIZE_MAP_FALLBACK[dbKey] || [];
  }
}

function getPriceSizesSync(dbKey) {
  return PRICE_SIZE_CACHE[dbKey] || PRICE_SIZE_MAP_FALLBACK[dbKey] || [];
}

// ─── DB切替 ──────────────────────────────────────────────────────────────────
function priceSelectDb(key) {
  priceState.dbKey = key;
  priceState.step = 'search';
  priceState.query = '';
  priceState.selectedSize = '';
  priceState.makerFilter = 'all';
  priceState.patternRows = [];
  priceState.selectedPattern = '';
  priceState.results = [];
  priceState.estOpen = {};
  priceState.estPct = {};
  renderPriceHome();
}

// ─── STEP1: サイズ入力画面 ───────────────────────────────────────────────────
function renderPriceHome() {
  priceState.initialized = true;
  if (priceState.step === 'pattern') { renderPricePatternStep(); return; }
  if (priceState.step === 'result')  { renderPriceResultStep();  return; }

  const el = document.getElementById('price-content');
  el.innerHTML = `
    <div class="price-search-wrap">
      <div class="screen-label" style="padding-top:4px;">価格検索</div>
      <div class="screen-title" style="margin-bottom:10px;">A表 価格参照</div>
      <div class="price-db-tabs" id="price-db-tabs">
        ${Object.entries(PRICE_DB_MAP).map(([k,db]) =>
          `<div class="price-db-tab${priceState.dbKey===k?' active':''}" onclick="priceSelectDb('${k}')">${db.icon} ${db.name}</div>`
        ).join('')}
      </div>
      <div class="screen-sub" style="margin-bottom:8px;">サイズを入力（3文字以上で候補表示）</div>
      <div class="search-box" style="margin-bottom:6px;">
        <input id="price-search-inp" type="search"
          placeholder="例：225 または 22585R16"
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
          inputmode="numeric" lang="en" enterkeyhint="search"
          value="${priceState.query}"
          oninput="priceInputNormalize(this)"
          style="ime-mode:disabled;font-family:'DM Mono',monospace;">
        <button class="search-clear" onclick="priceClearSearch()">✕</button>
      </div>
      <div id="price-size-candidates" class="candidates" style="margin-bottom:6px;"></div>
      <button class="btn-primary" id="price-search-btn" style="margin-bottom:12px;"
        onclick="priceGoPattern()" ${priceState.selectedSize?'':'disabled'}>
        ${priceState.selectedSize ? priceState.selectedSize+' のパターンを選ぶ →' : 'サイズを選択してください'}
      </button>
    </div>`;

  if (priceState.query && priceState.query.length >= 3) priceFilterSizes(priceState.query);
}

function priceInputNormalize(el) {
  let v = el.value;
  v = v.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  v = v.replace(/[／]/g, '/').replace(/[．]/g, '.').replace(/　/g, ' ');
  v = v.toUpperCase();
  if (el.value !== v) {
    const pos = el.selectionStart;
    el.value = v;
    try { el.setSelectionRange(pos, pos); } catch(e) {}
  }
  priceState.query = v;
  priceFilterSizes(v);
}

function normalizeSizeQuery(q) { return q.replace(/[\/R\.]/gi,'').replace(/\s/g,'').toUpperCase(); }
function normalizeSizeStr(s)   { return s.replace(/[\/R\.]/gi,'').replace(/\s/g,'').toUpperCase(); }

// ─── ★修正③ priceFilterSizes を async 化（Notionから動的取得）──────────────
async function priceFilterSizes(v) {
  priceState.query = v;
  const q = v.trim();
  const c = document.getElementById('price-size-candidates');
  const btn = document.getElementById('price-search-btn');
  if (!c) return;
  if (q.length < 3) {
    c.innerHTML = q.length > 0
      ? `<div style="text-align:center;padding:8px;font-size:12px;color:var(--muted);">あと${3-q.length}文字入力してください</div>`
      : '';
    if (btn) { btn.disabled = true; btn.textContent = 'サイズを選択してください'; }
    return;
  }
  // 初回のみローディング表示（2回目以降はキャッシュで即返る）
  if (!PRICE_SIZE_CACHE[priceState.dbKey]) {
    c.innerHTML = `<div style="text-align:center;padding:8px;font-size:12px;color:var(--muted);">サイズ一覧を取得中…</div>`;
  }
  // Notionから動的取得（キャッシュがあれば即返る）
  const sizes = await fetchPriceSizes(priceState.dbKey);
  const nq = normalizeSizeQuery(q);
  const hits = sizes.filter(s => {
    const ns = normalizeSizeStr(s);
    return ns.includes(nq) || s.toUpperCase().includes(q.replace(/\s/g,''));
  }).slice(0, 15);  // 15件まで表示（サイズ数が多いため増やした）
  if (hits.length === 0) {
    c.innerHTML = `<div style="text-align:center;padding:8px;font-size:12px;color:var(--muted);">候補なし — そのまま検索できます</div>`;
    priceState.selectedSize = q;
    if (btn) { btn.disabled = false; btn.textContent = `「${q}」のパターンを選ぶ →`; }
    return;
  }
  c.innerHTML = hits.map(s =>
    `<div class="candidate${priceState.selectedSize===s?' sel':''}" onclick="pricePickSize('${s}')">
      <span class="candidate-text">${s}</span>
      <span class="candidate-badge">選択</span>
    </div>`
  ).join('');
  if (priceState.selectedSize && hits.includes(priceState.selectedSize) && btn) {
    btn.disabled = false;
    btn.textContent = `${priceState.selectedSize} のパターンを選ぶ →`;
  }
}

function pricePickSize(s) {
  priceState.selectedSize = s;
  priceState.query = s;
  const inp = document.getElementById('price-search-inp');
  if (inp) inp.value = s;
  const c = document.getElementById('price-size-candidates');
  if (c) c.querySelectorAll('.candidate').forEach(el => {
    el.classList.toggle('sel', el.querySelector('.candidate-text').textContent === s);
  });
  const btn = document.getElementById('price-search-btn');
  if (btn) { btn.disabled = false; btn.textContent = `${s} のパターンを選ぶ →`; }
}

function priceClearSearch() {
  priceState.query = '';
  priceState.selectedSize = '';
  priceState.step = 'search';
  priceState.patternRows = [];
  priceState.selectedPattern = '';
  priceState.results = [];
  priceState.estOpen = {};
  priceState.estPct = {};
  renderPriceHome();
}

// ─── STEP1→2: Notionからサイズで絞り込み → パターン選択へ ──────────────────
async function priceGoPattern() {
  if (priceState.loading) return;
  const sz = priceState.selectedSize || priceState.query;
  if (!sz) return;
  priceState.loading = true;

  const el = document.getElementById('price-content');
  el.innerHTML = `
    <div class="content">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">パターンデータを取得中…</div>
      </div>
    </div>`;

  const db = PRICE_DB_MAP[priceState.dbKey];
  try {
    let all = [], cursor;
    while (true) {
      const body = { filter: { property: 'サイズ', rich_text: { contains: sz } }, page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await notionAPI('POST', `/databases/${db.id}/query`, body);
      if (res.object === 'error') throw new Error(res.message);
      all = all.concat(res.results);
      if (!res.has_more) break;
      cursor = res.next_cursor;
    }
    priceState.patternRows = all.map(r => {
      const p = r.properties;
      return {
        id: r.id,
        size:    p['サイズ']?.rich_text?.[0]?.plain_text || '',
        pattern: p['パターン']?.select?.name || '',
        maker:   p['メーカー']?.select?.name || '',
        cat:     p['カテゴリ']?.select?.name || '',
        price:   p['価格']?.number ?? null,
        note:    p['備考']?.rich_text?.[0]?.plain_text || '',
        weight:  p['加重指数']?.rich_text?.[0]?.plain_text || '',
      };
    });
    priceState.loading = false;
    priceState.step = 'pattern';
    priceState.selectedPattern = '';
    renderPricePatternStep();
  } catch(e) {
    priceState.loading = false;
    el.innerHTML = `
      <div class="content">
        <div class="error-box">取得に失敗しました。<br><small>${e.message}</small></div>
        <button class="btn-secondary" onclick="priceState.step='search';renderPriceHome()">← 戻る</button>
      </div>`;
  }
}

// ─── STEP2: パターン選択画面 ─────────────────────────────────────────────────
function renderPricePatternStep() {
  const rows = priceState.patternRows;
  const MAKER_ORDER = ['TOYO TIRES','BRIDGESTONE','DUNLOP','YOKOHAMA'];
  const makerLabel = { 'TOYO TIRES':'TOYO', 'BRIDGESTONE':'BS', 'DUNLOP':'DUNLOP', 'YOKOHAMA':'YOKO', 'all':'全メーカー' };

  const patMap = {};
  rows.forEach(r => {
    const key = r.pattern + '|' + r.maker;
    if (!patMap[key]) patMap[key] = { pattern: r.pattern, maker: r.maker, minPrice: r.price };
    else if (r.price !== null && (patMap[key].minPrice === null || r.price < patMap[key].minPrice)) {
      patMap[key].minPrice = r.price;
    }
  });

  let pats = Object.values(patMap).filter(p =>
    priceState.makerFilter === 'all' || p.maker === priceState.makerFilter
  );
  pats.sort((a,b) => {
    const ai = MAKER_ORDER.indexOf(a.maker); const bi = MAKER_ORDER.indexOf(b.maker);
    const md = (ai===-1?99:ai) - (bi===-1?99:bi);
    return md !== 0 ? md : a.pattern.localeCompare(b.pattern);
  });

  const makers = ['all', ...MAKER_ORDER.filter(m => Object.values(patMap).some(p => p.maker === m))];
  const makerTabsHtml = makers.map(m =>
    `<div class="price-db-tab${priceState.makerFilter===m?' active':''}" style="font-size:11px;"
      onclick="pricePatternFilterMaker('${m}')">${makerLabel[m]||m}</div>`
  ).join('');

  const el = document.getElementById('price-content');
  el.innerHTML = `
    <div class="price-search-wrap">
      <button class="btn-secondary" style="margin-bottom:12px;margin-top:4px;" onclick="priceState.step='search';renderPriceHome()">
        ← ${priceState.selectedSize} を変更
      </button>
      <div class="screen-label">パターンを選択</div>
      <div style="font-size:20px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);margin-bottom:10px;letter-spacing:-0.02em;">
        ${priceState.selectedSize}
      </div>
      <div class="price-db-tabs" style="margin-bottom:12px;">${makerTabsHtml}</div>
      <div class="pattern-list">
        ${pats.length === 0
          ? `<div class="price-empty">該当するパターンが見つかりません</div>`
          : pats.map(p => {
              const key = p.pattern+'|'+p.maker;
              const sel = priceState.selectedPattern === key;
              return `
              <div class="pattern-item${sel?' sel':''}" onclick="pricePickPattern('${key.replace(/'/g,"\\'")}')">
                <div class="pattern-dot"></div>
                <div>
                  <div class="pattern-name">${p.pattern}</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px;">${p.maker}</div>
                </div>
                <div style="margin-left:auto;text-align:right;flex-shrink:0;">
                  ${p.minPrice !== null
                    ? `<div style="font-size:14px;font-weight:700;color:var(--accent);">¥${p.minPrice.toLocaleString()}</div>
                       <div style="font-size:9px;color:var(--muted);">A表〜</div>`
                    : `<div style="font-size:12px;color:var(--muted);">要確認</div>`
                  }
                </div>
              </div>`;
            }).join('')
        }
      </div>
      <button class="btn-primary" id="price-pattern-btn" style="margin-top:8px;"
        onclick="priceGoResult()" ${priceState.selectedPattern?'':'disabled'}>
        ${priceState.selectedPattern
          ? priceState.selectedPattern.split('|')[0]+' の価格を見る →'
          : 'パターンを選択してください'}
      </button>
    </div>`;
}

function pricePatternFilterMaker(maker) {
  priceState.makerFilter = maker;
  priceState.selectedPattern = '';
  renderPricePatternStep();
}

function pricePickPattern(key) {
  priceState.selectedPattern = key;
  document.querySelectorAll('.pattern-item').forEach(el => el.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  const patName = key.split('|')[0];
  const btn = document.getElementById('price-pattern-btn');
  if (btn) { btn.disabled = false; btn.textContent = `${patName} の価格を見る →`; }
}

// ─── STEP2→3: パターン選択後に絞り込み結果表示 ──────────────────────────────
function priceGoResult() {
  if (!priceState.selectedPattern) return;
  const [pat, maker] = priceState.selectedPattern.split('|');
  priceState.results = priceState.patternRows.filter(r => r.pattern === pat && r.maker === maker);
  priceState.results.sort((a,b) => {
    if (a.price===null) return 1; if (b.price===null) return -1;
    return a.price - b.price;
  });
  priceState.step = 'result';
  priceState.estOpen = {};
  priceState.estPct = {};
  renderPriceResultStep();
}

// ─── STEP3: 結果 + 見積もり ──────────────────────────────────────────────────
function renderPriceResultStep() {
  const rows = priceState.results;
  const el = document.getElementById('price-content');

  let cardsHtml = rows.map((r, idx) => buildPriceCard(r, idx)).join('');

  el.innerHTML = `
    <div class="price-search-wrap" style="padding-bottom:0;">
      <button class="btn-secondary" style="margin-bottom:12px;margin-top:4px;" onclick="priceState.step='pattern';renderPricePatternStep()">
        ← パターン選択に戻る
      </button>
      <div class="screen-label">検索結果</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px;">
        <span style="font-size:20px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);letter-spacing:-0.02em;">${priceState.selectedSize}</span>
        <span style="font-size:13px;font-weight:700;color:var(--text);">${priceState.selectedPattern.split('|')[0]}</span>
        <span style="font-size:11px;color:var(--muted);">${rows.length}件</span>
      </div>
    </div>
    <div class="price-result-list" id="price-cards-area">
      ${cardsHtml}
    </div>`;
}

function buildPriceCard(r, idx) {
  const cardId = 'pc' + idx;
  const isOpen = !!priceState.estOpen[cardId];
  const pct = priceState.estPct[cardId] || 100;
  const pctList = [70,75,80,85,90,95,100];
  const bp = r.price ?? 'null';

  const pctTabsHtml = pctList.map(p => {
    const val = r.price !== null ? Math.round(r.price * p / 100) : null;
    return `<div class="pct-tab${pct===p?' active':''}" onclick="priceSetPct('${cardId}',${p},${bp})">
      <div style="font-size:11px;font-weight:700;">${p===100?'A表':p+'%'}</div>
      <div style="font-size:10px;margin-top:1px;opacity:0.85;">${val!==null?'¥'+val.toLocaleString():'-'}</div>
    </div>`;
  }).join('');

  const curPctVal = r.price !== null ? Math.round(r.price * pct / 100) : null;
  const pctOuterHtml = isOpen ? `
    <div style="padding:0 20px 0;">
      <div style="background:var(--s1);border:1.5px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:8px;">
        <div class="screen-label" style="margin-bottom:8px;">掛率を選択（内部用）</div>
        <div class="pct-tabs" id="${cardId}-pcts">${pctTabsHtml}</div>
      </div>
    </div>` : '';

  const numAttr = (id, val) =>
    `id="${cardId}-${id}" type="text" inputmode="decimal"
     value="${val}"
     onfocus="priceNumFocus(this)"
     onblur="priceNumBlur(this,'${cardId}',${bp})"
     oninput="priceNumInput(this,'${cardId}',${bp})"
     class="est-inp"`;

  const qtyAttr = (id, val) =>
    `id="${cardId}-${id}" type="text" inputmode="numeric"
     value="${val}"
     onfocus="priceNumFocus(this)"
     onblur="priceNumBlur(this,'${cardId}',${bp})"
     oninput="priceNumInput(this,'${cardId}',${bp})"
     class="est-inp"`;

  const tireUnitDisp = curPctVal !== null ? curPctVal.toLocaleString() : '-';

  return `
  ${pctOuterHtml}
  <div class="price-card" id="${cardId}" style="cursor:pointer;">
    <div onclick="priceToggleEst('${cardId}',${bp})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:22px;font-weight:900;font-family:'DM Mono',monospace;color:var(--text);letter-spacing:-0.02em;line-height:1.1;">${r.size}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
            <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(240,165,0,0.12);color:var(--accent);">${r.pattern}</span>
            <span style="font-size:11px;color:var(--muted);">${r.maker}</span>
          </div>
          ${r.weight ? `<div style="font-size:11px;color:var(--muted);margin-top:3px;">${r.weight}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px;">
          ${isOpen
            ? `<div style="font-size:12px;color:var(--muted);">見積もり 閉じる ↑</div>`
            : `<div style="font-size:10px;color:var(--muted);">見積もり ↓</div>`}
        </div>
      </div>
      ${r.note ? `<div class="price-note" style="margin-top:8px;">${r.note}</div>` : ''}
    </div>

    <div id="${cardId}-est" style="display:${isOpen?'block':'none'};">
      <div style="height:0.5px;background:var(--border);margin:12px 0;"></div>

      <div class="screen-label" style="margin-bottom:4px;">追加項目</div>
      <div style="display:grid;grid-template-columns:1fr 80px 64px;gap:5px;margin-bottom:4px;">
        <div></div>
        <div style="font-size:10px;color:var(--muted);text-align:right;">単価</div>
        <div style="font-size:10px;color:var(--muted);text-align:right;">数量</div>
      </div>

      <div class="est-row">
        <span class="est-lbl">タイヤ</span>
        <div id="${cardId}-tunit" style="font-size:13px;color:var(--accent);font-family:'DM Mono',monospace;text-align:right;padding:7px 4px;">
          ¥${tireUnitDisp}
        </div>
        <input ${qtyAttr('tqty','4')} style="text-align:right;">
      </div>
      <div class="est-row">
        <span class="est-lbl">工賃</span>
        <input ${numAttr('ku','3,000')}>
        <input ${qtyAttr('kq','4')}>
      </div>
      <div class="est-row">
        <span class="est-lbl">廃タイヤ</span>
        <input ${numAttr('hu','500')}>
        <input ${qtyAttr('hq','4')}>
      </div>
      <div class="est-row">
        <span class="est-lbl">出張</span>
        <input ${numAttr('su','0')}>
        <input ${qtyAttr('sq','1')}>
      </div>
      <div class="est-row">
        <input type="text" placeholder="その他1（商品名）" id="${cardId}-o1n" class="est-inp"
          style="text-align:left;font-size:12px;"
          oninput="priceCalcEst('${cardId}',${bp})">
        <input ${numAttr('o1u','0')}>
        <input ${qtyAttr('o1q','1')}>
      </div>
      <div class="est-row">
        <input type="text" placeholder="その他2（商品名）" id="${cardId}-o2n" class="est-inp"
          style="text-align:left;font-size:12px;"
          oninput="priceCalcEst('${cardId}',${bp})">
        <input ${numAttr('o2u','0')}>
        <input ${qtyAttr('o2q','1')}>
      </div>

      <div class="screen-label" style="margin-top:10px;margin-bottom:4px;">備考</div>
      <textarea id="${cardId}-memo" placeholder="お客様へのメモ・特記事項など"
        class="memo-input" style="min-height:60px;font-size:13px;"></textarea>

      <div id="${cardId}-bd" style="margin:10px 0 6px;font-size:12px;"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
        <div style="background:var(--s2);border-radius:8px;padding:10px 12px;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px;">税別合計</div>
          <div style="font-size:18px;font-weight:900;color:var(--text);font-family:'DM Mono',monospace;" id="${cardId}-tot">-</div>
        </div>
        <div style="background:var(--s2);border-radius:8px;padding:10px 12px;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px;">税込（10%）</div>
          <div style="font-size:18px;font-weight:900;color:var(--accent);font-family:'DM Mono',monospace;" id="${cardId}-tax">-</div>
        </div>
      </div>
    </div>
  </div>`;
}

function priceToggleEst(cardId, basePrice) {
  const wasOpen = !!priceState.estOpen[cardId];
  priceState.estOpen[cardId] = !wasOpen;
  renderPriceResultStep();
  if (priceState.estOpen[cardId]) {
    setTimeout(() => priceCalcEst(cardId, basePrice), 30);
  }
}

function priceSetPct(cardId, pct, basePrice) {
  priceState.estPct[cardId] = pct;
  const container = document.getElementById(cardId + '-pcts');
  if (container) {
    container.querySelectorAll('.pct-tab').forEach((el, i) => {
      el.classList.toggle('active', [70,75,80,85,90,95,100][i] === pct);
    });
  }
  const tunit = document.getElementById(cardId + '-tunit');
  if (tunit && basePrice !== null) {
    const val = Math.round(basePrice * pct / 100);
    tunit.textContent = '¥' + val.toLocaleString();
  }
  priceCalcEst(cardId, basePrice);
}

function priceEstVal(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  const v = el.value.replace(/,/g, '').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  return parseFloat(v) || 0;
}
function priceEstStr(id) { return document.getElementById(id)?.value || ''; }

function priceNumFocus(el) {
  const v = el.value.replace(/,/g, '');
  el.value = v;
  el.select();
}

function priceNumBlur(el, cardId, basePrice) {
  const v = el.value.replace(/,/g, '').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  const n = parseFloat(v);
  const isUnit = el.id && !el.id.endsWith('q') || el.id.endsWith('tqty') === false && el.id.match(/u$/);
  if (!isNaN(n) && n > 0 && el.id && el.id.match(/-(ku|hu|su|o1u|o2u)$/)) {
    el.value = n.toLocaleString();
  } else if (!isNaN(n)) {
    el.value = n === 0 ? '0' : String(n);
  }
  priceCalcEst(cardId, basePrice);
}

function priceNumInput(el, cardId, basePrice) {
  let v = el.value;
  v = v.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  v = v.replace(/[^0-9,]/g, '');
  if (el.value !== v) el.value = v;
  priceCalcEst(cardId, basePrice);
}

function priceCalcEst(cardId, basePrice) {
  const pct = priceState.estPct[cardId] || 100;
  const tireUnit = basePrice !== null ? Math.round(basePrice * pct / 100) : 0;
  const tQty = priceEstVal(cardId+'-tqty');

  const tunit = document.getElementById(cardId + '-tunit');
  if (tunit && basePrice !== null) tunit.textContent = '¥' + tireUnit.toLocaleString();

  const items = [
    { name: `タイヤ (${pct===100?'A表':pct+'%'})`, unit: tireUnit, qty: tQty },
    { name: '工賃',     unit: priceEstVal(cardId+'-ku'), qty: priceEstVal(cardId+'-kq') },
    { name: '廃タイヤ', unit: priceEstVal(cardId+'-hu'), qty: priceEstVal(cardId+'-hq') },
    { name: '出張',     unit: priceEstVal(cardId+'-su'), qty: priceEstVal(cardId+'-sq') },
  ];
  const o1Name = priceEstStr(cardId+'-o1n').trim() || 'その他1';
  const o1Unit = priceEstVal(cardId+'-o1u');
  const o1Qty  = priceEstVal(cardId+'-o1q');
  if (o1Unit > 0) items.push({ name: o1Name, unit: o1Unit, qty: o1Qty });
  const o2Name = priceEstStr(cardId+'-o2n').trim() || 'その他2';
  const o2Unit = priceEstVal(cardId+'-o2u');
  const o2Qty  = priceEstVal(cardId+'-o2q');
  if (o2Unit > 0) items.push({ name: o2Name, unit: o2Unit, qty: o2Qty });

  let total = 0, bdHtml = '';
  items.forEach(it => {
    const sub = it.unit * it.qty;
    if (sub === 0) return;
    total += sub;
    bdHtml += `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border);">
      <span style="color:var(--muted);">${it.name} × ${it.qty}</span>
      <span>¥${sub.toLocaleString()}</span>
    </div>`;
  });

  const bd  = document.getElementById(cardId+'-bd');
  const tot = document.getElementById(cardId+'-tot');
  const tax = document.getElementById(cardId+'-tax');
  if (bd)  bd.innerHTML  = bdHtml;
  if (tot) tot.textContent = '¥' + total.toLocaleString();
  if (tax) tax.textContent = '¥' + Math.round(total * 1.1).toLocaleString();
}

function digits(s) { return s.replace(/[^\d]/g, ''); }

function filterSizes(v) {
  const q = v.trim();
  const all = Object.values(DB_MAP).flatMap(db => db.sizes);
  const uniq = [...new Set(all)];
  let hits = [];
  if (q) {
    const dq = digits(q);
    hits = uniq.filter(s => {
      const ds = digits(s);
      return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
    }).slice(0, 8);
  }
  const c = document.getElementById('sz-candidates');
  if (!c) return;
  c.innerHTML = hits.map(s =>
    `<div class="candidate${state.size === s ? ' sel' : ''}" onclick="pickSize('${s}')">
      <span class="candidate-text">${s}</span>
      <span class="candidate-badge">選択</span>
    </div>`
  ).join('');
  const btn = document.getElementById('sz-next');
  if (btn) btn.disabled = !state.size;
}

// ─── Notion API ──────────────────────────────────────────────────────────────

async function notionAPI(method, path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 15000);
  try {
    const res = await fetch('https://notion-proxy.33322666666mm.workers.dev' + path, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
      signal: controller.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message + ' (code: ' + data.code + ')');
    return data;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト（15秒）。通信環境を確認してください。');
    throw new Error('通信エラー: ' + e.message);
  }
}

function getNow() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  return `${y}-${m}`;
}

function buildTitle(s) {
  const db = DB_MAP[state.cat];
  const k = state.isMove ? '移動' : state.kubun;
  const w = state.isMove ? `${state.moveDir.from}→${state.moveDir.to}` : state.warehouse;
  return `${s} ${state.pattern} ${k} ${w}`;
}

async function createRecord(kubun, warehouse) {
  const db = DB_MAP[state.cat];
  const wField = db.warehouseField;
  const props = {
    'タイトル': { title: [{ text: { content: buildTitle(state.size) } }] },
    'サイズコード': { select: { name: state.size } },
    'パターン名': { select: { name: state.pattern } },
    '数量': { number: state.qty },
    '区分': { select: { name: kubun } },
    '処理タイプ': { select: { name: KUBUN_TO_SHORIYTYPE[kubun] || '出庫' } },
    '年月': { rich_text: [{ text: { content: getNow() } }] },
    '作成者': { select: { name: (USER_NAME || '').replace(/ /g, '　') } },
  };
  props[wField] = { select: { name: warehouse } };
  if (state.dest && (state.kubun === '出庫' || state.kubun === '準備')) {
    props['出庫先'] = { rich_text: [{ text: { content: state.dest } }] };
  }
  if (state.cat === 'ltl_normal') {
    if (state.memo) props['メモ'] = { select: { name: state.memo } };
    else delete props['メモ'];
  } else {
    props['メモ'] = { rich_text: state.memo ? [{ text: { content: state.memo } }] : [] };
  }

  return await notionAPI('POST', '/pages', {
    parent: { database_id: db.id },
    properties: props
  });
}

async function submitEntry() {
  const btn = document.getElementById('send-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中…'; }

  try {
    let result;
    if (state.isMove) {
      result = await createRecord('移動出庫', state.moveDir.from);
      if (result.object === 'error') throw new Error(result.message + ' (code: ' + result.code + ')');
      result = await createRecord('移動入庫', state.moveDir.to);
      if (result.object === 'error') throw new Error(result.message + ' (code: ' + result.code + ')');
    } else {
      result = await createRecord(state.kubun, state.warehouse);
      if (result.object === 'error') throw new Error(result.message + ' (code: ' + result.code + ')');
    }
    goStep(8);
  } catch(e) {
    const errEl = document.getElementById('confirm-error');
    if (errEl) errEl.innerHTML = `<div class="error-box">送信に失敗しました。<br><small>${e.message}</small></div>`;
    if (btn) { btn.disabled = false; btn.textContent = 'この内容で送信する'; }
  }
}

function filterStockSizes(v) {
  const q = v.trim();
  const all = Object.values(DB_MAP).flatMap(db => db.sizes);
  const uniq = [...new Set(all)];
  let hits = [];
  if (q) {
    const dq = digits(q);
    hits = uniq.filter(s => {
      const ds = digits(s);
      return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
    }).slice(0, 8);
  }
  const c = document.getElementById('stock-sz-candidates');
  if (!c) return;
  c.innerHTML = hits.map(s =>
    `<div class="candidate" onclick="pickStockSize('${s}')">
      <span class="candidate-text">${s}</span>
      <span class="candidate-badge">選択</span>
    </div>`
  ).join('');
}

function pickStockSize(s) {
  stockState.size = s;
  const matching = Object.entries(DB_MAP).filter(([k, db]) => db.sizes.includes(s));
  if (matching.length === 1) {

async function loadStockData(size, catKey) {
  const el = document.getElementById('stock-content');
  el.innerHTML = `

      <div class="loading-text">在庫データを取得中…</div>
    </div>`;

    el.innerHTML = `

      </div>`;

async function fetchAllRecords(dbId, sizeFilter) {
  let all = [], cursor = undefined;
  while (true) {
    const body = {
      filter: { property: 'サイズコード', select: { equals: sizeFilter } },
      page_size: 100
    };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, body);
    if (res.object === 'error') throw new Error(res.message);
    all = all.concat(res.results);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}

function calcStock(records, catKey) {
  const db = DB_MAP[catKey];
  const wField = db.warehouseField;
  const stock = {};
  db.patterns.forEach(p => {
    stock[p] = {};
    WAREHOUSES.forEach(w => { stock[p][w] = 0; });
  });

  records.forEach(r => {
    const props = r.properties;
    const pattern = props['パターン名']?.select?.name;
    const warehouse = props[wField]?.select?.name;
    const qty = props['数量']?.number || 0;
    const kubun = props['区分']?.select?.name || '';
    if (!pattern || !warehouse) return;
    const sign = KUBUN_SIGN[kubun] || 0;
    if (!stock[pattern]) stock[pattern] = {};
    if (!stock[pattern][warehouse]) stock[pattern][warehouse] = 0;
    stock[pattern][warehouse] += sign * qty;
  });
  return stock;
}

function renderStockResult(size, catKey, records) {
  const el = document.getElementById('stock-content');
  const db = DB_MAP[catKey];
  const stock = calcStock(records, catKey);

  let html = `
    <div class="content">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <button onclick="renderStockHome()" style="background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;">←</button>
        <div class="screen-label" style="margin:0;">在庫確認</div>
      </div>
      <div class="screen-title" style="font-family:'DM Mono',monospace;font-size:18px;">${size}</div>
      <div class="screen-sub" style="margin-bottom:0;">${db.name}</div>`;

  html += `<div style="margin-top:16px;">`;
  html += `<div style="display:flex;justify-content:flex-end;gap:24px;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px;">
    ${WAREHOUSES.map(w => `<div style="text-align:center;min-width:48px;"><div style="font-size:10px;color:var(--muted);">${w.replace('倉庫','')}</div></div>`).join('')}
  </div>`;

  const MAKER_ORDER = ['TOYO','BRIDGESTONE','DUNLOP','MICHELIN','PIRELLI'];
  const sortedPatterns = [...db.patterns].sort((a, b) => {
    const makerA = getMaker(a);
    const makerB = getMaker(b);
    const orderA = MAKER_ORDER.indexOf(makerA);
    const orderB = MAKER_ORDER.indexOf(makerB);
    if (orderA !== orderB) return orderA - orderB;
    const sumA = WAREHOUSES.reduce((s, w) => s + (stock[a]?.[w] || 0), 0);
    const sumB = WAREHOUSES.reduce((s, w) => s + (stock[b]?.[w] || 0), 0);
    return sumB - sumA;
  });

  sortedPatterns.forEach(p => {
    html += `
      <div class="stock-row">
        <div class="stock-pattern" style="display:flex;align-items:center;gap:6px;">
          ${makerLogoImg(p, 30)}
          <span style="font-weight:600;">${p}</span>
        </div>
        <div class="stock-counts">
          ${WAREHOUSES.map(w => {
            const n = stock[p]?.[w] || 0;
            const cls = n === 0 ? 'zero' : 'positive';
            return `<div class="stock-count" style="min-width:48px;">
              <div class="stock-count-num ${cls}">${n}</div>
              <div class="stock-count-label">本</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  });

  html += `</div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);">
      全 ${records.length} 件のレコードから計算 ・ ${new Date().toLocaleTimeString('ja-JP')} 取得
    </div>
    <button class="btn-primary" style="margin-top:16px;" onclick="renderStockHome()">🔍 別のサイズを検索</button>
  </div>`;

  el.innerHTML = html;
}

// ─── 初期化 ──────────────────────────────────────────────────────────────────

window.onload = () => {
  const n = localStorage.getItem('tire_name');
  if (n) {
    _selectedStaff = n;
  }
};
</script>
